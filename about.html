<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於宇色 | 靈元院</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; line-height: 1.6; color: #333; background: #f9f7f4; }
        nav {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #6b4e31, #8d6e4f);
            box-shadow: 0 4px 20px rgba(107,78,49,0.3);
            z-index: 1000;
            color: white;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1rem 0;
        }
        li {
            position: relative;
            cursor: pointer;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        li:hover {
            background: rgba(255,255,255,0.15);
        }
        li a { text-decoration: none; color: inherit; }
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 1.2rem;
            min-width: 220px;
            border-radius: 12px;
            z-index: 1001;
            margin-top: 8px;
        }
        li.active .dropdown { display: block; }
        .dropdown a {
            display: block;
            padding: 0.6rem 1rem;
            text-decoration: none;
            color: #444;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .dropdown a:hover {
            background: #f0e9df;
            color: #6b4e31;
        }
        .dropdown hr {
            margin: 0.8rem 0;
            border: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <ul>
                <li><a href="/">首頁</a></li>
                <li><a href="about.html">關於宇色</a></li>
                <li onclick="toggleDropdown(this)">活動
                    <div class="dropdown">
                        <a href="#">🔸 近期講座與工作坊</a>
                        <a href="#">🔸 線上分享會</a>
                        <a href="#">🔸 冥想體驗營</a>
                        <hr>
                        <a href="#">📅 查看活動行事曆</a>
                    </div>
                </li>
                <li onclick="toggleDropdown(this)">文選
                    <div class="dropdown">
                        <a href="#">🔸 靈修隨筆</a>
                        <a href="#">🔸 塔羅洞見</a>
                        <a href="#">🔸 心養生文章</a>
                        <hr>
                        <a href="#">📚 完整文章列表</a>
                    </div>
                </li>
                <li onclick="toggleDropdown(this)">選物
                    <div class="dropdown">
                        <a href="#">🔸 推薦書籍</a>
                        <a href="#">🔸 靈性用品</a>
                        <a href="#">🔸 療癒工具</a>
                        <hr>
                        <a href="#">🛍️ 選物商店</a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <main style="max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem;">
        <h1 style="text-align:center; color:#6b4e31;">關於宇色</h1>
        <p>這裡是你的關於頁面內容...</p>
        <!-- 保留你原本的 about 內容 -->
    </main>

    <script>
        function toggleDropdown(el) {
            document.querySelectorAll('li.active').forEach(item => {
                if (item !== el) item.classList.remove('active');
            });
            el.classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('li')) {
                document.querySelectorAll('li.active').forEach(item => item.classList.remove('active'));
            }
        });
    </script>
</body>
</html>

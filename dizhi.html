.nav-links > li { position: relative; }
.nav-links > li > a,

.nav-links > li > span.has-dropdown::after {

  font-size: 10px;
  opacity: 0.6;
}
.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 14px);
  left: 50%;
  transform: translateX(-50%);
  background: #1a2620;
  border: 1px solid rgba(197, 162, 111, 0.2);
  border-radius: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  min-width: 170px;
  padding: 8px 0;
  z-index: 200;
  list-style: none;
}
.dropdown li a {
  display: block;
  padding: 11px 22px;
  color: var(--lyy-cream);
  text-decoration: none;
  font-size: 13.5px;
  transition: all 0.2s;
}
.dropdown li a:hover {
  background: rgba(197, 162, 111, 0.1);
  color: var(--lyy-gold);
}
.nav-links > li:hover .dropdown { display: block; }

/* Support Grid - 上下排 + hover 放大 */
.support-grid {

  grid-template-columns: 1fr;
  gap: 32px;
  margin: 40px 0;
}
.support-grid a {

}
.support-grid img {

  height: auto;
  display: block;
  border-radius: 4px;
  transition: transform 0.4s ease, box-shadow 0.3s ease;
  cursor: zoom-in;
}
.support-grid img:hover {

        <div class="poem">
            <p>貫穿五欲六塵的層層煙迷，<br>
            俯首越過靜謐陰罹；<br>
            静聽內在神性靈喚，<br>
            照鑒明台真理。</p>

    <div class="meaning">
        <div class="meaning-item">

            <p><strong>元靈本源</strong><br>Spirituality: That we inherit from the Source</p>
        </div>
        <div class="meaning-item">
            <h3>元</h3>
            <p><strong>自性本始</strong><br>Oneness: Who we are from the Beginning</p>
        </div>
        <div class="meaning-item">
            <h3>院</h3>
            <p><strong>謐靜空間</strong><br>Temple: Where we enjoy the Silence</p>
        </div>
    </div>
